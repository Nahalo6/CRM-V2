function doInviteUser(){
  const email=document.getElementById('invEmail').value.trim();
  if(!email){alert('Email required');return;}
  const users=JSON.parse(localStorage.getItem(USERS_KEY)||'[]');
  if(users.find(u=>u.email.toLowerCase()===email.toLowerCase())){alert('User with this email already exists');return;}
  const newUser={
    id:'u'+Date.now(),email,
    password:document.getElementById('invPass').value,
    firstName:document.getElementById('invFirst').value,
    lastName:document.getElementById('invLast').value,
    fullName:document.getElementById('invFirst').value+' '+document.getElementById('invLast').value,
    role:document.getElementById('invRole').value,
    agencyName:document.getElementById('invAgency').value,
    plan:'agency',subscriptionStatus:'active',
    createdAt:new Date().toISOString(),lastLogin:null,loginCount:0,
    usage:{accountsCreated:0,applicationsCompleted:0,mvrsRun:0,emailsSent:0}
  };
  users.push(newUser);
  localStorage.setItem(USERS_KEY,JSON.stringify(users));
  logEvent('user_invited',{userId:newUser.id,email:newUser.email,role:newUser.role});
  closeModal();render();
}

function adminDeleteUser(uid){
  if(!confirm('Delete this user permanently?'))return;
  let users=JSON.parse(localStorage.getItem(USERS_KEY)||'[]');
  users=users.filter(u=>u.id!==uid);
  localStorage.setItem(USERS_KEY,JSON.stringify(users));
  logEvent('user_deleted',{userId:uid});
  render();
}

function adminEditUser(uid){
  const users=JSON.parse(localStorage.getItem(USERS_KEY)||'[]');
  const u=users.find(x=>x.id===uid);if(!u)return;
  openModal('Edit User',`<div class="grid grid-2" style="gap:10px;margin-bottom:14px"><div><label class="lbl">First Name</label><input class="inp" id="euFirst" value="${u.firstName||''}"></div><div><label class="lbl">Last Name</label><input class="inp" id="euLast" value="${u.lastName||''}"></div></div><div style="margin-bottom:14px"><label class="lbl">Email</label><input class="inp" id="euEmail" value="${u.email||''}"></div><div class="grid grid-2" style="gap:10px;margin-bottom:14px"><div><label class="lbl">Role</label><select class="sel" style="width:100%" id="euRole"><option value="producer" ${u.role==='producer'?'selected':''}>Producer</option><option value="managing_producer" ${u.role==='managing_producer'?'selected':''}>Managing Producer</option><option value="admin" ${u.role==='admin'?'selected':''}>Admin</option></select></div><div><label class="lbl">Status</label><select class="sel" style="width:100%" id="euStatus"><option value="active" ${u.subscriptionStatus==='active'?'selected':''}>Active</option><option value="trialing" ${u.subscriptionStatus==='trialing'?'selected':''}>Trialing</option><option value="cancelled" ${u.subscriptionStatus==='cancelled'?'selected':''}>Cancelled</option></select></div></div><div style="margin-bottom:14px"><label class="lbl">Plan</label><select class="sel" style="width:100%" id="euPlan"><option value="solo" ${u.plan==='solo'?'selected':''}>Solo</option><option value="agency" ${u.plan==='agency'?'selected':''}>Agency</option><option value="enterprise" ${u.plan==='enterprise'?'selected':''}>Enterprise</option></select></div><div style="margin-bottom:14px"><label class="lbl">Reset Password (leave blank to keep)</label><input class="inp" id="euPass" placeholder="New password"></div><div class="flex" style="justify-content:flex-end;gap:8px"><button class="btn-s" onclick="closeModal()">Cancel</button><button class="btn-p" onclick="doUpdateUser('${uid}')">Save Changes</button></div>`,540);
}

function doUpdateUser(uid){
  const users=JSON.parse(localStorage.getItem(USERS_KEY)||'[]');
  const u=users.find(x=>x.id===uid);if(!u)return;
  u.firstName=document.getElementById('euFirst').value;
  u.lastName=document.getElementById('euLast').value;
  u.fullName=u.firstName+' '+u.lastName;
  u.email=document.getElementById('euEmail').value;
  u.role=document.getElementById('euRole').value;
  u.subscriptionStatus=document.getElementById('euStatus').value;
  u.plan=document.getElementById('euPlan').value;
  const newPass=document.getElementById('euPass').value;
  if(newPass)u.password=newPass;
  localStorage.setItem(USERS_KEY,JSON.stringify(users));
  logEvent('user_updated',{userId:uid});
  closeModal();render();
}

  showLoginScreen();
}else{
  // Logged in - run full CRM initialization
  
  // Add admin tab to nav if user is admin
  if(isAdmin()){
    TABS.push({key:"sep2",sep:true});
    TABS.push({key:"admin",label:"Admin Panel",icon:"shield"});
  }

  // Load saved state on startup
  const _hadSavedData=loadState();
  // Seed contacts from existing leads if contacts is empty (first run or migration)
  if(!state.contacts||state.contacts.length===0){
    state.contacts=[];
    (state.leads||[]).forEach(l=>{
      if(l.email)saveContact(l.email,l.contact||'',l.company||'','Customer');
    });
  }

  // Save before page closes (final flush)
  window.addEventListener('beforeunload',function(){
    if(_saveTimer){clearTimeout(_saveTimer);saveState();}
  });

  render();
  // Update save indicator after first render
  setTimeout(()=>{if(_hadSavedData){_lastSaveStatus='saved';updateSaveIndicator();}else{saveState();}},100);
}
</script>
</body>
</html>
